name: CD - Deploy to AWS

on:
  workflow_run:
    workflows: ["CI - Build and Push"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLICIP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            mkdir -p ~/ci-cd-app
            cd ~/ci-cd-app
            
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: kavya00/food-express-backend:latest
                ports:
                  - "5000:5000"
                environment:
                  - MONGODB_URI=mongodb+srv://kavyasrireddy28_db_user:admin123@cluster6.piqpnj0.mongodb.net/food_delivery?retryWrites=true&w=majority
                  - PORT=5000
                restart: always

              frontend:
                image: kavya00/food-express-frontend:latest
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: always
            EOF

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing docker.io..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
            fi

            if ! sudo docker compose version >/dev/null 2>&1 && ! sudo docker-compose version >/dev/null 2>&1; then
              echo "Docker compose missing. Installing automatically..."
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin docker-compose || true
            fi
            
            if sudo docker compose version >/dev/null 2>&1; then
              sudo docker compose pull
              sudo docker compose up -d
            elif sudo docker-compose version >/dev/null 2>&1; then
              sudo docker-compose pull
              sudo docker-compose up -d
            else
              echo "Error: Neither docker compose nor docker-compose could be run."
              exit 1
            fi

            sudo docker image prune -f
