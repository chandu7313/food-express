name: CD - Deploy to AWS

on:
  workflow_run:
    workflows: ["CI - Build and Push"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            mkdir -p ~/food-booking-app
            cd ~/food-booking-app
            
            # Create Nginx Config for Reverse Proxy
            cat <<'EOF' > nginx.conf
server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
EOF

            # Create Docker Compose file
            cat <<EOF > docker-compose.yml
services:
  backend:
    image: ${{ secrets.DOCKER_USERNAME }}/food-backend:latest
    environment:
      - MONGODB_URI=mongodb+srv://Chandramohan4156:Gcm12316144@cluster0.9ujym.mongodb.net/ci-cd
      - PORT=4000
      - JWT_SECRET=${{ secrets.JWT_SECRET }}
      - CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
      - CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
      - CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
    restart: always

  frontend:
    image: ${{ secrets.DOCKER_USERNAME }}/food-frontend:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
EOF

            # Use docker-compose if 'docker compose' (v2) is not available
            if docker compose version > /dev/null 2>&1; then
              DOCKER_COMPOSE="docker compose"
            else
              DOCKER_COMPOSE="docker-compose"
            fi

            $DOCKER_COMPOSE pull
            $DOCKER_COMPOSE up -d
            $DOCKER_COMPOSE ps
            docker image prune -f
